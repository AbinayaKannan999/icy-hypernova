version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: foodbridge-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-foodbridge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: foodbridge-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Injecting environment variables directly into the container from an optional explicit .env file or default
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-foodbridge}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_here_change_me}
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build:
      context: ./frontend
      # Pass build arguments into React bundle to define API URLs
      # The React bundle will naturally point to the domain it is hosted on
    container_name: foodbridge-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: always

volumes:
  postgres_data:
